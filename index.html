<!DOCTYPE html>

<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Calcetto BPS</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<style>
  :root { --red: #C0392B; --red-dark: #96281B; --off-white: #F5F0EE; --gray: #888; --green: #27AE60; --yellow: #F39C12; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Barlow', sans-serif; background: var(--off-white); color: #222; min-height: 100vh; }
  header { background: var(--red); padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 12px rgba(0,0,0,0.25); }
  .logo-area { display: flex; align-items: center; gap: 12px; }
  .logo-svg { width: 52px; height: 52px; }
  .site-title { font-family: 'Bebas Neue', sans-serif; color: white; font-size: 26px; letter-spacing: 1px; line-height: 1; }
  .site-subtitle { color: rgba(255,255,255,0.75); font-size: 11px; letter-spacing: 2px; text-transform: uppercase; }
  .admin-btn { background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3); color: white; padding: 7px 14px; border-radius: 20px; font-size: 13px; font-family: 'Barlow', sans-serif; font-weight: 600; cursor: pointer; }
  main { max-width: 600px; margin: 0 auto; padding: 20px 16px 40px; }
  .loading { text-align: center; padding: 60px 20px; color: var(--gray); font-size: 16px; }
  .spinner { width: 40px; height: 40px; border: 4px solid #eee; border-top-color: var(--red); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .match-card { background: white; border-radius: 16px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.10); margin-bottom: 20px; }
  .match-header { background: var(--red); padding: 18px 20px; color: white; }
  .match-date { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 1px; }
  .match-details { display: flex; gap: 16px; margin-top: 6px; flex-wrap: wrap; }
  .match-detail { display: flex; align-items: center; gap: 5px; font-size: 13px; color: rgba(255,255,255,0.9); }
  .slots-section { padding: 16px 20px; border-bottom: 1px solid #f0f0f0; }
  .slots-label { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: var(--gray); margin-bottom: 10px; }
  .slots-bar-wrap { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 8px; }
  .slot { width: 28px; height: 28px; border-radius: 6px; font-size: 11px; font-weight: 700; display: flex; align-items: center; justify-content: center; }
  .slot.taken { background: var(--red); color: white; }
  .slot.free { background: #eee; color: #bbb; }
  .slot.waiting { background: var(--yellow); color: white; }
  .slots-count { font-size: 13px; color: var(--gray); }
  .slots-count strong { color: #222; }
  .players-section { padding: 16px 20px; border-bottom: 1px solid #f0f0f0; }
  .players-list { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; }
  .player-row { display: flex; align-items: center; gap: 10px; padding: 8px 12px; background: #fafafa; border-radius: 10px; font-size: 14px; }
  .player-num { width: 22px; height: 22px; border-radius: 50%; background: var(--red); color: white; font-size: 11px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .player-num.waiting-num { background: var(--yellow); }
  .player-name { flex: 1; font-weight: 600; }
  .player-option { font-size: 11px; padding: 3px 8px; border-radius: 10px; font-weight: 600; }
  .option-partita { background: #E8F5E9; color: #27AE60; }
  .option-cena { background: #FFF3E0; color: #E67E22; }
  .empty-list { text-align: center; color: var(--gray); padding: 20px 0; font-size: 14px; }
  .waiting-divider { display: flex; align-items: center; gap: 8px; margin: 10px 0 8px; }
  .waiting-divider span { font-size: 11px; font-weight: 700; color: var(--yellow); text-transform: uppercase; letter-spacing: 1px; white-space: nowrap; }
  .waiting-divider::before, .waiting-divider::after { content: ''; flex: 1; height: 1px; background: #eee; }
  .remove-player { background: none; border: none; color: #ccc; font-size: 18px; cursor: pointer; padding: 0 4px; }
  .signup-section { padding: 20px; }
  .section-title { font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 0.5px; margin-bottom: 14px; color: #222; }
  .form-group { margin-bottom: 14px; }
  .form-label { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--gray); margin-bottom: 6px; display: block; }
  .form-input { width: 100%; padding: 12px 14px; border: 2px solid #eee; border-radius: 10px; font-size: 16px; font-family: 'Barlow', sans-serif; transition: border-color 0.2s; background: #fafafa; -webkit-appearance: none; }
  .form-input:focus { outline: none; border-color: var(--red); background: white; }
  .option-selector { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .option-card { border: 2px solid #eee; border-radius: 12px; padding: 14px 12px; cursor: pointer; transition: all 0.2s; text-align: center; position: relative; background: #fafafa; }
  .option-card.selected { border-color: var(--red); background: #FFF5F5; }
  .option-card.selected::after { content: '✓'; position: absolute; top: 8px; right: 10px; color: var(--red); font-weight: 700; font-size: 14px; }
  .option-icon { font-size: 28px; margin-bottom: 6px; }
  .option-title { font-weight: 700; font-size: 14px; }
  .option-price { font-size: 12px; color: var(--gray); margin-top: 2px; }
  .payment-section { background: #fafafa; border-radius: 12px; padding: 14px; margin-bottom: 14px; border: 1px solid #eee; }
  .payment-title { font-size: 13px; font-weight: 700; margin-bottom: 10px; }
  .payment-methods { display: flex; gap: 8px; }
  .pay-method { flex: 1; border: 2px solid #eee; border-radius: 10px; padding: 10px; text-align: center; cursor: pointer; background: white; transition: all 0.2s; font-size: 13px; font-weight: 600; }
  .pay-method.selected { border-color: var(--red); background: #FFF5F5; }
  .pay-method-icon { font-size: 22px; display: block; margin-bottom: 3px; }
  .submit-btn { width: 100%; background: var(--red); color: white; border: none; padding: 16px; border-radius: 12px; font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 1px; cursor: pointer; transition: background 0.2s; }
  .submit-btn:disabled { background: #ccc; cursor: not-allowed; }
  .success-msg { background: #E8F5E9; border: 1px solid #A5D6A7; border-radius: 12px; padding: 16px; text-align: center; color: #2E7D32; font-weight: 600; font-size: 15px; display: none; margin-top: 12px; }
  .success-msg.show { display: block; }
  .error-msg { background: #FFEBEE; border: 1px solid #FFCDD2; border-radius: 12px; padding: 12px 16px; color: #C62828; font-size: 14px; display: none; margin-top: 10px; }
  .error-msg.show { display: block; }
  .info-banner { background: #FFF3CD; border: 1px solid #FFE082; border-radius: 10px; padding: 10px 14px; font-size: 13px; color: #856404; margin-bottom: 14px; }
  .no-match-card { background: white; border-radius: 16px; padding: 40px 24px; text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
  .no-match-icon { font-size: 60px; margin-bottom: 16px; }
  .no-match-title { font-family: 'Bebas Neue', sans-serif; font-size: 24px; color: #444; margin-bottom: 8px; }
  .no-match-sub { color: var(--gray); font-size: 14px; }
  .admin-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 200; align-items: flex-end; justify-content: center; }
  .admin-overlay.show { display: flex; }
  .admin-sheet { background: white; border-radius: 24px 24px 0 0; width: 100%; max-width: 600px; max-height: 90vh; overflow-y: auto; padding: 24px 20px 40px; animation: slideUp 0.3s ease; }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .admin-handle { width: 40px; height: 4px; background: #ddd; border-radius: 2px; margin: 0 auto 20px; }
  .admin-title { font-family: 'Bebas Neue', sans-serif; font-size: 24px; margin-bottom: 20px; color: var(--red); }
  .admin-section { margin-bottom: 24px; }
  .admin-section h3 { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--gray); margin-bottom: 10px; }
  .admin-row { display: flex; gap: 10px; align-items: flex-end; margin-bottom: 10px; }
  .admin-row .form-input { flex: 1; font-size: 14px; padding: 10px 12px; }
  .admin-action-btn { background: var(--red); color: white; border: none; padding: 10px 18px; border-radius: 10px; font-family: 'Barlow', sans-serif; font-weight: 700; font-size: 14px; cursor: pointer; white-space: nowrap; }
  .admin-action-btn.secondary { background: #444; }
  .admin-action-btn.danger { background: #C0392B; }
  .admin-close { width: 100%; padding: 14px; background: #f5f5f5; border: none; border-radius: 12px; font-family: 'Barlow', sans-serif; font-weight: 700; font-size: 15px; cursor: pointer; margin-top: 10px; }
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 300; align-items: center; justify-content: center; padding: 20px; }
  .modal-overlay.show { display: flex; }
  .modal-box { background: white; border-radius: 16px; padding: 28px 24px; width: 100%; max-width: 340px; text-align: center; }
  .modal-box h3 { font-family: 'Bebas Neue', sans-serif; font-size: 22px; margin-bottom: 16px; color: var(--red); }
  .modal-btns { display: flex; gap: 10px; margin-top: 14px; }
  .modal-btns button { flex: 1; }
  .cancel-btn { padding: 12px; background: #f5f5f5; border: none; border-radius: 10px; font-family: 'Barlow', sans-serif; font-weight: 700; font-size: 15px; cursor: pointer; }
  .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px); background: #222; color: white; padding: 12px 24px; border-radius: 30px; font-size: 14px; font-weight: 600; z-index: 500; transition: transform 0.3s ease; white-space: nowrap; }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .stripe-note { font-size: 12px; color: var(--gray); text-align: center; margin-top: 10px; }
</style>
</head>

<script>
// EmailJS
emailjs.init('flrbP3X7zlQjyUBw4');
const EMAILJS_SERVICE = 'service_luqamhc';
const EMAILJS_TEMPLATE = '__ejs-test-mail-service__';

const SUPABASE_URL = 'https://txbdwhsycblubqeissuf.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR4YmR3aHN5Y2JsdWJxZWlzc3VmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1MTQ0NDUsImV4cCI6MjA4OTA5MDQ0NX0.G-k25oWhaBsWp0B5TyPsPF9EnRzIKjopOPGnmmF25W0';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const ADMIN_PASSWORD = 'calcettobps2024';
const MAX_PLAYERS = 16;

let currentMatch = null;
let players = [];
let selectedOption = 'partita';
let selectedPayment = 'cash';

async function init() {
  await loadMatch();
  sb.channel('realtime-calcetto')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'players' }, () => loadMatch())
    .on('postgres_changes', { event: '*', schema: 'public', table: 'matches' }, () => loadMatch())
    .subscribe();
}

async function loadMatch() {
  const { data: matches } = await sb.from('matches').select('*').eq('active', true).order('created_at', { ascending: false }).limit(1);
  currentMatch = matches?.[0] || null;
  if (currentMatch) {
    const { data: p } = await sb.from('players').select('*').eq('match_id', currentMatch.id).order('created_at', { ascending: true });
    players = p || [];
  } else { players = []; }
  render();
}

function render() {
  const main = document.getElementById('mainContent');
  const isAdmin = sessionStorage.getItem('adminLogged') === '1';

  if (!currentMatch) {
    main.innerHTML = `<div class="no-match-card"><div class="no-match-icon">⚽</div><div class="no-match-title">Nessuna partita in programma</div><div class="no-match-sub">Torna presto o contatta l'organizzatore</div></div>`;
    return;
  }

  const confirmed = players.filter(p => !p.waiting);
  const waiting = players.filter(p => p.waiting);
  const spotsLeft = MAX_PLAYERS - confirmed.length;

  let slotsHTML = '';
  for (let i = 0; i < MAX_PLAYERS; i++) {
    const p = confirmed[i];
    slotsHTML += `<div class="slot ${p ? 'taken' : 'free'}">${p ? p.name.charAt(0).toUpperCase() : ''}</div>`;
  }
  waiting.forEach(p => { slotsHTML += `<div class="slot waiting">${p.name.charAt(0).toUpperCase()}</div>`; });

  let playersHTML = '';
  if (confirmed.length === 0) {
    playersHTML = `<div class="empty-list">Nessun iscritto ancora. Sii il primo! 🚀</div>`;
  } else {
    confirmed.forEach((p, i) => {
      playersHTML += `<div class="player-row">
        <div class="player-num">${i+1}</div>
        <div class="player-name">${p.name}</div>
        <span class="player-option ${p.option==='cena'?'option-cena':'option-partita'}">${p.option==='cena'?'🍕 Cena':'⚽ Partita'}</span>
        ${isAdmin?`<button class="remove-player" onclick="removePlayer('${p.id}')">✕</button>`:''}
      </div>`;
    });
    if (waiting.length > 0) {
      playersHTML += `<div class="waiting-divider"><span>Lista d'attesa</span></div>`;
      waiting.forEach((p, i) => {
        playersHTML += `<div class="player-row" style="opacity:0.7">
          <div class="player-num waiting-num">W${i+1}</div>
          <div class="player-name">${p.name}</div>
          <span class="player-option ${p.option==='cena'?'option-cena':'option-partita'}">${p.option==='cena'?'🍕 Cena':'⚽ Partita'}</span>
          ${isAdmin?`<button class="remove-player" onclick="removePlayer('${p.id}')">✕</button>`:''}
        </div>`;
      });
    }
  }

  const pm = currentMatch.price_match || 0;
  const pd = currentMatch.price_dinner || 0;

  main.innerHTML = `
    <div class="match-card">
      <div class="match-header">
        <div class="match-date">⚽ ${formatDate(currentMatch.date)}</div>
        <div class="match-details">
          <div class="match-detail"><span>🕐</span>${currentMatch.time}</div>
          <div class="match-detail"><span>📍</span>${currentMatch.field||'Da definire'}</div>
          <div class="match-detail"><span>👥</span>${confirmed.length}/${MAX_PLAYERS}</div>
        </div>
      </div>
      <div class="slots-section">
        <div class="slots-label">Posti disponibili</div>
        <div class="slots-bar-wrap">${slotsHTML}</div>
        <div class="slots-count"><strong>${Math.max(0,spotsLeft)}</strong> posti liberi · <strong>${waiting.length}</strong> in attesa</div>
      </div>
      <div class="players-section">
        <div class="slots-label">Lista iscritti</div>
        <div class="players-list">${playersHTML}</div>
      </div>
      <div class="signup-section">
        <div class="section-title">Iscriviti alla partita</div>
        ${spotsLeft<=3&&spotsLeft>0?`<div class="info-banner">⚠️ Ultimi <strong>${spotsLeft} posti</strong>!</div>`:''}
        ${spotsLeft<=0?`<div class="info-banner">⚠️ Partita al completo — puoi iscriverti in lista d'attesa.</div>`:''}
        <div class="form-group">
          <label class="form-label">Il tuo nome</label>
          <input type="text" class="form-input" id="playerName" placeholder="Nome e cognome" autocomplete="name">
        </div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" class="form-input" id="playerEmail" placeholder="email@esempio.ch" autocomplete="email">
        </div>
        <div class="form-group">
          <label class="form-label">Scelta</label>
          <div class="option-selector">
            <div class="option-card selected" id="optPartita" onclick="selectOption('partita')">
              <div class="option-icon">⚽</div><div class="option-title">Solo Partita</div>
              <div class="option-price">${pm>0?'CHF '+pm:'Gratis'}</div>
            </div>
            <div class="option-card" id="optCena" onclick="selectOption('cena')">
              <div class="option-icon">🍕</div><div class="option-title">Partita + Cena</div>
              <div class="option-price">${pd>0?'CHF '+pd:'Da definire'}</div>
            </div>
          </div>
        </div>
        ${pm>0?`<div class="payment-section">
          <div class="payment-title">💳 Pagamento</div>
          <div class="payment-methods">
            <div class="pay-method selected" id="payCash" onclick="selectPayment('cash')"><span class="pay-method-icon">💵</span>Contanti</div>
            <div class="pay-method" id="payTwint" onclick="selectPayment('twint')"><span class="pay-method-icon">📱</span>TWINT</div>
            <div class="pay-method" id="payCard" onclick="selectPayment('card')"><span class="pay-method-icon">💳</span>Carta</div>
          </div>
        </div>`:''}
        <button class="submit-btn" id="signupBtn" onclick="signUp()">⚽ ISCRIVITI ORA</button>
        <div class="success-msg" id="successMsg"></div>
        <div class="error-msg" id="errorMsg"></div>
        <div class="stripe-note">🔒 I tuoi dati sono al sicuro</div>
      </div>
    </div>`;
}

function selectOption(opt) {
  selectedOption = opt;
  document.querySelectorAll('.option-card').forEach(c => c.classList.remove('selected'));
  document.getElementById(opt==='partita'?'optPartita':'optCena').classList.add('selected');
}
function selectPayment(method) {
  selectedPayment = method;
  document.querySelectorAll('.pay-method').forEach(c => c.classList.remove('selected'));
  const el = document.getElementById('pay'+method.charAt(0).toUpperCase()+method.slice(1));
  if (el) el.classList.add('selected');
}

async function signUp() {
  const name = document.getElementById('playerName')?.value?.trim();
  const email = document.getElementById('playerEmail')?.value?.trim();
  if (!name) { showError('Inserisci il tuo nome.'); return; }
  if (!email||!email.includes('@')) { showError("Inserisci un'email valida."); return; }
  const exists = players.find(p => p.email?.toLowerCase()===email.toLowerCase());
  if (exists) { showError('Sei già iscritto con questa email!'); return; }

  const confirmed = players.filter(p => !p.waiting);
  const isWaiting = confirmed.length >= MAX_PLAYERS;
  const btn = document.getElementById('signupBtn');
  btn.disabled = true; btn.textContent = 'Salvataggio...';

  const { error } = await sb.from('players').insert({
    match_id: currentMatch.id, name, email,
    option: selectedOption, payment: selectedPayment, paid: false, waiting: isWaiting
  });

  if (error) {
    showError("Errore durante l'iscrizione. Riprova.");
    btn.disabled = false; btn.textContent = '⚽ ISCRIVITI ORA';
    return;
  }

  const msg = isWaiting ? `🎉 ${name}, sei in lista d'attesa!` : `🎉 ${name}, sei iscritto alla partita!`;

  // Invia email di conferma al giocatore
  sendEmailConferma(name, email, isWaiting);

  await loadMatch();
  setTimeout(() => {
    const s = document.getElementById('successMsg');
    if (s) { s.textContent = msg; s.classList.add('show'); }
    const b = document.getElementById('signupBtn');
    if (b) { b.disabled = false; b.textContent = '⚽ ISCRIVITI ORA'; }
  }, 100);
}

async function removePlayer(id) {
  const player = players.find(p => p.id===id);
  if (!player) return;
  await sb.from('players').delete().eq('id', id);
  if (!player.waiting) {
    const firstWaiting = players.find(p => p.waiting && p.id!==id);
    if (firstWaiting) {
      await sb.from('players').update({ waiting: false }).eq('id', firstWaiting.id);
      sendEmailPromozione(firstWaiting);
      showToast(`${firstWaiting.name} promosso dalla lista d'attesa! 🎉`);
    }
  }
  await loadMatch();
}

function openAdminLogin() {
  if (sessionStorage.getItem('adminLogged')==='1') {
    document.getElementById('adminOverlay').classList.add('show');
    document.getElementById('adminDate').value = new Date().toISOString().split('T')[0];
    return;
  }
  document.getElementById('passwordModal').classList.add('show');
  setTimeout(() => document.getElementById('adminPassword')?.focus(), 100);
}
function checkAdminPassword() {
  if (document.getElementById('adminPassword').value===ADMIN_PASSWORD) {
    sessionStorage.setItem('adminLogged','1');
    closePasswordModal(); openAdminLogin(); render();
  } else {
    document.getElementById('pwError').classList.add('show');
    document.getElementById('adminPassword').value='';
  }
}
function closePasswordModal() {
  document.getElementById('passwordModal').classList.remove('show');
  document.getElementById('adminPassword').value='';
  document.getElementById('pwError').classList.remove('show');
}
function closeAdmin() { document.getElementById('adminOverlay').classList.remove('show'); }
function closeAdminIfOutside(e) { if (e.target===document.getElementById('adminOverlay')) closeAdmin(); }

async function createMatch() {
  const date = document.getElementById('adminDate').value;
  const time = document.getElementById('adminTime').value;
  const field = document.getElementById('adminField').value;
  const price_match = parseFloat(document.getElementById('adminPriceMatch').value)||0;
  const price_dinner = parseFloat(document.getElementById('adminPriceDinner').value)||0;
  if (!date||!time) { showToast('⚠️ Inserisci data e orario!'); return; }
  await sb.from('matches').update({ active: false }).eq('active', true);
  const { error } = await sb.from('matches').insert({ date, time, field, price_match, price_dinner, active: true });
  if (error) { showToast('❌ Errore: '+error.message); return; }
  closeAdmin(); showToast('✅ Partita creata!');
  await loadMatch();
  // Invia email a tutti gli iscritti precedenti
  if (players.length > 0) sendEmailNuovaPartita(players);
}

async function deleteMatch() {
  if (!currentMatch) return;
  if (!confirm('Eliminare la partita corrente?')) return;
  await sb.from('matches').update({ active: false }).eq('id', currentMatch.id);
  closeAdmin(); showToast('🗑️ Partita eliminata.');
  await loadMatch();
}

function exportCSV() {
  if (!players.length) { showToast('Nessun iscritto da esportare.'); return; }
  let csv = 'Nome,Email,Opzione,Pagamento,Pagato,Lista attesa\n';
  players.forEach(p => { csv += `"${p.name}","${p.email}","${p.option}","${p.payment}","${p.paid?'Sì':'No'}","${p.waiting?'Sì':'No'}"\n`; });
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.download='calcetto_bps.csv'; a.click();
}

function formatDate(d) {
  if (!d) return '';
  return new Date(d+'T12:00:00').toLocaleDateString('it-IT', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
}
function showError(msg) {
  const el = document.getElementById('errorMsg');
  if (el) { el.textContent=msg; el.classList.add('show'); setTimeout(()=>el.classList.remove('show'),4000); }
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3000);
}

// ─── EMAIL ────────────────────────────────────────────────
function sendEmailConferma(name, email, isWaiting) {
  const params = {
    to_email: email,
    subject: isWaiting ? "Sei in lista d'attesa!" : "Iscrizione confermata!",
    message: isWaiting
      ? `Ciao ${name}! Sei stato aggiunto alla lista d'attesa. Ti avviseremo appena si libera un posto.`
      : `Ciao ${name}! La tua iscrizione è confermata. Ti aspettiamo in campo! ⚽`,
    player_name: name,
    player_option: selectedOption === 'cena' ? 'Partita + Cena 🍕' : 'Solo Partita ⚽',
    match_date: formatDate(currentMatch?.date),
    match_time: currentMatch?.time || '',
    match_field: currentMatch?.field || 'Da definire',
  };
  emailjs.send(EMAILJS_SERVICE, EMAILJS_TEMPLATE, params)
    .then(() => console.log('✅ Email inviata a', email))
    .catch(e => console.error('❌ Errore email:', e));
}

function sendEmailNuovaPartita(players) {
  players.forEach(p => {
    if (!p.email) return;
    const params = {
      to_email: p.email,
      subject: '🚨 Nuova partita creata!',
      message: `Ciao ${p.name}! È stata creata una nuova partita. Iscriviti subito su calcetto-bps.netlify.app`,
      player_name: p.name,
      player_option: '',
      match_date: formatDate(currentMatch?.date),
      match_time: currentMatch?.time || '',
      match_field: currentMatch?.field || 'Da definire',
    };
    emailjs.send(EMAILJS_SERVICE, EMAILJS_TEMPLATE, params)
      .catch(e => console.error('Errore email broadcast:', e));
  });
}

function sendEmailPromozione(player) {
  const params = {
    to_email: player.email,
    subject: '🎉 Sei entrato in squadra!',
    message: `Ciao ${player.name}! Si è liberato un posto e sei ora ufficialmente iscritto alla partita. Ti aspettiamo! ⚽`,
    player_name: player.name,
    player_option: player.option === 'cena' ? 'Partita + Cena 🍕' : 'Solo Partita ⚽',
    match_date: formatDate(currentMatch?.date),
    match_time: currentMatch?.time || '',
    match_field: currentMatch?.field || 'Da definire',
  };
  emailjs.send(EMAILJS_SERVICE, EMAILJS_TEMPLATE, params)
    .catch(e => console.error('Errore email promozione:', e));
}

init();
</script>
